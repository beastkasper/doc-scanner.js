<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Сканер документа</title>
    <style>
      :root {
        --bg: #0e1014;
        --panel: #161a21;
        --line: #262c36;
        --ink: #e7ecf3;
        --muted: #8893a4;
        --accent: #36e0a0;
        --accent-ink: #04140d;
        --danger: #ff6b6b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font:
          15px/1.45 ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        max-width: 680px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }
      header h1 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.2px;
        margin: 0;
      }
      header .hint {
        font-size: 12px;
        color: var(--muted);
      }
      .stage {
        position: relative;
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
      }
      video,
      #overlay,
      #editCanvas,
      #resultCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #overlay {
        pointer-events: none;
      }
      #editWrap,
      #resultWrap {
        position: absolute;
        inset: 0;
        display: none;
      }
      #editCanvas {
        touch-action: none;
      }
      .handle {
        position: absolute;
        width: 30px;
        height: 30px;
        margin: -15px 0 0 -15px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        background: rgba(54, 224, 160, 0.18);
        touch-action: none;
        cursor: grab;
      }
      .handle::after {
        content: "";
        position: absolute;
        inset: 11px;
        border-radius: 50%;
        background: var(--accent);
      }
      .handle:active {
        cursor: grabbing;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: var(--panel);
      }
      button {
        font: inherit;
        font-weight: 600;
        border: 1px solid var(--line);
        background: #1d222b;
        color: var(--ink);
        padding: 11px 16px;
        border-radius: 11px;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
      button.primary {
        background: var(--accent);
        color: var(--accent-ink);
        border-color: transparent;
      }
      button.ghost {
        background: transparent;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .shutter {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 4px solid #2c333f;
        background: #fff;
        padding: 0;
      }
      .shutter:disabled {
        background: #555;
      }
      .filters {
        display: flex;
        gap: 8px;
      }
      .filters button {
        padding: 8px 12px;
        font-size: 13px;
        border-radius: 9px;
      }
      .filters button[aria-pressed="true"] {
        border-color: var(--accent);
        color: var(--accent);
      }
      .status {
        position: absolute;
        left: 50%;
        top: 14px;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--ink);
        backdrop-filter: blur(6px);
        max-width: 90%;
        text-align: center;
      }
      .err {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        color: var(--muted);
      }
      .err b {
        color: var(--ink);
      }
      a.dl {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Сканер документа</h1>
        <span class="hint" id="hint">Наведите на документ</span>
      </header>

      <div class="stage" id="stage">
        <video id="video" playsinline muted></video>
        <canvas id="overlay"></canvas>

        <div id="editWrap">
          <canvas id="editCanvas"></canvas>
          <!-- 4 ручки добавляются скриптом -->
        </div>

        <div id="resultWrap">
          <canvas id="resultCanvas"></canvas>
        </div>

        <div class="status" id="status" hidden></div>
        <div class="err" id="err">
          <b>Нет доступа к камере</b>
          <span id="errMsg"></span>
          <span
            >Откройте страницу по HTTPS или с localhost и разрешите
            камеру.</span
          >
        </div>
      </div>

      <!-- Панель: режим съёмки -->
      <div class="toolbar" id="barCapture">
        <button class="ghost" id="flipBtn" title="Сменить камеру">
          ↺ Камера
        </button>
        <button class="shutter" id="shutter" aria-label="Снять"></button>
        <button class="ghost" id="autoBtn" aria-pressed="true">
          Авто-углы
        </button>
      </div>

      <!-- Панель: режим правки углов -->
      <div class="toolbar" id="barEdit" style="display: none">
        <button class="ghost" id="retakeBtn">Заново</button>
        <button class="primary" id="scanBtn">Сканировать →</button>
      </div>

      <!-- Панель: результат -->
      <div class="toolbar" id="barResult" style="display: none">
        <button class="ghost" id="backBtn">← Углы</button>
        <div class="filters" role="group" aria-label="Фильтр">
          <button data-f="color" aria-pressed="true">Цвет</button>
          <button data-f="gray" aria-pressed="false">Ч/б</button>
          <button data-f="bw" aria-pressed="false">Скан</button>
        </div>
        <button class="primary" id="saveBtn">Скачать</button>
      </div>

      <a id="dl" class="dl"></a>
    </div>

    <script>
      "use strict";

      /* ───────────────────── Состояние ───────────────────── */
      const els = {
        video: document.getElementById("video"),
        overlay: document.getElementById("overlay"),
        editWrap: document.getElementById("editWrap"),
        editCanvas: document.getElementById("editCanvas"),
        resultWrap: document.getElementById("resultWrap"),
        resultCanvas: document.getElementById("resultCanvas"),
        stage: document.getElementById("stage"),
        status: document.getElementById("status"),
        hint: document.getElementById("hint"),
        err: document.getElementById("err"),
        errMsg: document.getElementById("errMsg"),
        barCapture: document.getElementById("barCapture"),
        barEdit: document.getElementById("barEdit"),
        barResult: document.getElementById("barResult"),
        shutter: document.getElementById("shutter"),
        flipBtn: document.getElementById("flipBtn"),
        autoBtn: document.getElementById("autoBtn"),
        retakeBtn: document.getElementById("retakeBtn"),
        scanBtn: document.getElementById("scanBtn"),
        backBtn: document.getElementById("backBtn"),
        saveBtn: document.getElementById("saveBtn"),
        dl: document.getElementById("dl"),
      };
      const octx = els.overlay.getContext("2d");

      let stream = null;
      let facing = "environment";
      let rafId = 0;
      let autoDetect = true;

      // квадрат углов в НОРМАЛИЗОВАННЫХ координатах [0..1] относительно кадра видео.
      // порядок: TL, TR, BR, BL
      let quad = null;
      let liveQuad = null; // последний авто-результат из live-цикла
      let captured = null; // ImageBitmap/canvas снятого кадра
      let capW = 0,
        capH = 0; // нативный размер снятого кадра
      let currentFilter = "color";
      let lastResult = null; // {colorCanvas} исходный выпрямленный кадр (до фильтра)

      const PROC_W = 320; // ширина для live-обработки (производительность)

      /* ───────────────────── Камера ───────────────────── */
      async function startCamera() {
        stopCamera();
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: facing },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
            audio: false,
          });
          els.video.srcObject = stream;
          await els.video.play();
          els.err.style.display = "none";
          loop();
        } catch (e) {
          els.err.style.display = "flex";
          els.errMsg.textContent = e && e.message ? e.message : String(e);
        }
      }
      function stopCamera() {
        cancelAnimationFrame(rafId);
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
      }

      /* ───────────────────── Live-цикл: края + авто-углы ───────────────────── */
      const proc = document.createElement("canvas");
      const pctx = proc.getContext("2d", { willReadFrequently: true });

      function loop() {
        rafId = requestAnimationFrame(loop);
        const v = els.video;
        if (!v.videoWidth) return;

        // подгоняем overlay под отображаемый размер
        sizeOverlay();

        // даунскейл кадра в proc-канвас
        const pw = PROC_W,
          ph = Math.round((PROC_W * v.videoHeight) / v.videoWidth);
        if (proc.width !== pw || proc.height !== ph) {
          proc.width = pw;
          proc.height = ph;
        }
        pctx.drawImage(v, 0, 0, pw, ph);
        const img = pctx.getImageData(0, 0, pw, ph);

        const gray = toGray(img.data, pw, ph);
        const blur = boxBlur(gray, pw, ph, 2);
        const edges = sobel(blur, pw, ph); // Uint8 magnitude 0..255
        const bin = threshold(edges, pw, ph); // Uint8 0/1, динамический порог

        octx.clearRect(0, 0, els.overlay.width, els.overlay.height);
        drawEdgesOverlay(bin, pw, ph);

        if (autoDetect) {
          const q = detectQuad(bin, pw, ph); // нормализованные углы или null
          if (q) {
            liveQuad = q;
          }
        }
        if (liveQuad) drawQuadOverlay(liveQuad);
      }

      function sizeOverlay() {
        const r = els.stage.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const W = Math.round(r.width * dpr),
          H = Math.round(r.height * dpr);
        if (els.overlay.width !== W || els.overlay.height !== H) {
          els.overlay.width = W;
          els.overlay.height = H;
        }
      }

      /* ───────────────────── Обработка изображения ───────────────────── */
      function toGray(rgba, w, h) {
        const g = new Uint8ClampedArray(w * h);
        for (let i = 0, j = 0; i < rgba.length; i += 4, j++) {
          g[j] =
            (rgba[i] * 0.299 + rgba[i + 1] * 0.587 + rgba[i + 2] * 0.114) | 0;
        }
        return g;
      }
      function boxBlur(src, w, h, r) {
        // разделимый box-blur (горизонт + вертикаль)
        const tmp = new Uint8ClampedArray(w * h),
          out = new Uint8ClampedArray(w * h);
        const win = r * 2 + 1;
        for (let y = 0; y < h; y++) {
          let acc = 0;
          for (let x = -r; x <= r; x++) acc += src[y * w + clamp(x, 0, w - 1)];
          for (let x = 0; x < w; x++) {
            tmp[y * w + x] = acc / win;
            acc +=
              src[y * w + clamp(x + r + 1, 0, w - 1)] -
              src[y * w + clamp(x - r, 0, w - 1)];
          }
        }
        for (let x = 0; x < w; x++) {
          let acc = 0;
          for (let y = -r; y <= r; y++) acc += tmp[clamp(y, 0, h - 1) * w + x];
          for (let y = 0; y < h; y++) {
            out[y * w + x] = acc / win;
            acc +=
              tmp[clamp(y + r + 1, 0, h - 1) * w + x] -
              tmp[clamp(y - r, 0, h - 1) * w + x];
          }
        }
        return out;
      }
      function sobel(g, w, h) {
        const out = new Uint8ClampedArray(w * h);
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const i = y * w + x;
            const a = g[i - w - 1],
              b = g[i - w],
              c = g[i - w + 1],
              d = g[i - 1],
              f = g[i + 1],
              p = g[i + w - 1],
              q = g[i + w],
              r = g[i + w + 1];
            const gx = c + 2 * f + r - (a + 2 * d + p);
            const gy = p + 2 * q + r - (a + 2 * b + c);
            out[i] = Math.min(255, Math.hypot(gx, gy));
          }
        }
        return out;
      }
      function threshold(edges, w, h) {
        // порог = mean + k*std по всему кадру (адаптивно к освещению)
        let sum = 0,
          sum2 = 0;
        const n = edges.length;
        for (let i = 0; i < n; i++) {
          const v = edges[i];
          sum += v;
          sum2 += v * v;
        }
        const mean = sum / n,
          std = Math.sqrt(Math.max(0, sum2 / n - mean * mean));
        const t = Math.max(30, mean + 1.2 * std);
        const bin = new Uint8Array(n);
        for (let i = 0; i < n; i++) bin[i] = edges[i] > t ? 1 : 0;
        return bin;
      }
      const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);

      /* ───────────────────── Авто-детект четырёхугольника ───────────────────── *
       * Стратегия без полного contour-tracing: берём облако сильных краевых точек
       * и находим 4 экстремума (min/max по x±y). Это даёт устойчивую стартовую
       * рамку, когда документ — доминирующий контрастный объект в кадре.
       * Пользователь всё равно корректирует углы вручную — как в реальных сканерах.
       */
      function detectQuad(bin, w, h) {
        let minSum = Infinity,
          maxSum = -Infinity,
          minDiff = Infinity,
          maxDiff = -Infinity;
        let tl = null,
          br = null,
          tr = null,
          bl = null,
          count = 0;
        // игнорируем тонкую рамку у краёв кадра
        const m = 2;
        for (let y = m; y < h - m; y++) {
          for (let x = m; x < w - m; x++) {
            if (!bin[y * w + x]) continue;
            count++;
            const s = x + y,
              d = x - y;
            if (s < minSum) {
              minSum = s;
              tl = [x, y];
            }
            if (s > maxSum) {
              maxSum = s;
              br = [x, y];
            }
            if (d > maxDiff) {
              maxDiff = d;
              tr = [x, y];
            }
            if (d < minDiff) {
              minDiff = d;
              bl = [x, y];
            }
          }
        }
        if (count < 80 || !tl || !tr || !br || !bl) return null;
        const pts = [tl, tr, br, bl].map((p) => [p[0] / w, p[1] / h]);
        // отбраковка вырожденных рамок (слишком маленькая площадь)
        if (polyArea(pts) < 0.05) return null;
        return pts.map((p) => ({ x: p[0], y: p[1] }));
      }
      function polyArea(pts) {
        let a = 0;
        for (let i = 0; i < pts.length; i++) {
          const [x1, y1] = pts[i],
            [x2, y2] = pts[(i + 1) % pts.length];
          a += x1 * y2 - x2 * y1;
        }
        return Math.abs(a) / 2;
      }

      /* ───────────────────── Отрисовка overlay ───────────────────── */
      function videoRectInStage() {
        // object-fit:contain → вычисляем реальную область кадра внутри stage
        const v = els.video,
          cw = els.overlay.width,
          ch = els.overlay.height;
        const vr = v.videoWidth / v.videoHeight,
          sr = cw / ch;
        let dw, dh, ox, oy;
        if (vr > sr) {
          dw = cw;
          dh = cw / vr;
          ox = 0;
          oy = (ch - dh) / 2;
        } else {
          dh = ch;
          dw = ch * vr;
          oy = 0;
          ox = (cw - dw) / 2;
        }
        return { ox, oy, dw, dh };
      }
      function drawEdgesOverlay(bin, pw, ph) {
        const { ox, oy, dw, dh } = videoRectInStage();
        // мелкая краевая картинка → масштабируем в overlay
        const tmp = document.createElement("canvas");
        tmp.width = pw;
        tmp.height = ph;
        const tctx = tmp.getContext("2d");
        const id = tctx.createImageData(pw, ph);
        for (let i = 0, j = 0; i < bin.length; i++, j += 4) {
          if (bin[i]) {
            id.data[j] = 54;
            id.data[j + 1] = 224;
            id.data[j + 2] = 160;
            id.data[j + 3] = 150;
          }
        }
        tctx.putImageData(id, 0, 0);
        octx.imageSmoothingEnabled = false;
        octx.globalAlpha = 0.85;
        octx.drawImage(tmp, ox, oy, dw, dh);
        octx.globalAlpha = 1;
      }
      function drawQuadOverlay(q) {
        const { ox, oy, dw, dh } = videoRectInStage();
        const P = q.map((p) => ({ x: ox + p.x * dw, y: oy + p.y * dh }));
        octx.beginPath();
        octx.moveTo(P[0].x, P[0].y);
        for (let i = 1; i < 4; i++) octx.lineTo(P[i].x, P[i].y);
        octx.closePath();
        octx.fillStyle = "rgba(54,224,160,.12)";
        octx.fill();
        octx.lineWidth = 3;
        octx.strokeStyle = "#36e0a0";
        octx.stroke();
        for (const p of P) {
          octx.beginPath();
          octx.arc(p.x, p.y, 6, 0, Math.PI * 2);
          octx.fillStyle = "#36e0a0";
          octx.fill();
        }
      }

      /* ───────────────────── Снимок → режим правки ───────────────────── */
      async function capture() {
        const v = els.video;
        capW = v.videoWidth;
        capH = v.videoHeight;
        const c = document.createElement("canvas");
        c.width = capW;
        c.height = capH;
        c.getContext("2d").drawImage(v, 0, 0, capW, capH);
        captured = c;

        // стартовый квадрат: авто-результат или рамка с отступом 8%
        quad = liveQuad
          ? liveQuad.map((p) => ({ ...p }))
          : [
              { x: 0.08, y: 0.08 },
              { x: 0.92, y: 0.08 },
              { x: 0.92, y: 0.92 },
              { x: 0.08, y: 0.92 },
            ];

        setMode("edit");
        drawEditFrame();
        placeHandles();
      }

      function drawEditFrame() {
        const ec = els.editCanvas,
          dpr = Math.min(window.devicePixelRatio || 1, 2);
        const r = els.stage.getBoundingClientRect();
        ec.width = Math.round(r.width * dpr);
        ec.height = Math.round(r.height * dpr);
        ec.style.width = r.width + "px";
        ec.style.height = r.height + "px";
        const ctx = ec.getContext("2d");
        ctx.clearRect(0, 0, ec.width, ec.height);
        const { ox, oy, dw, dh } = fitRect(capW, capH, ec.width, ec.height);
        ctx.drawImage(captured, ox, oy, dw, dh);
        // полигон между ручками
        const P = quad.map((p) => ({ x: ox + p.x * dw, y: oy + p.y * dh }));
        ctx.beginPath();
        ctx.moveTo(P[0].x, P[0].y);
        for (let i = 1; i < 4; i++) ctx.lineTo(P[i].x, P[i].y);
        ctx.closePath();
        ctx.fillStyle = "rgba(54,224,160,.10)";
        ctx.fill();
        ctx.lineWidth = 2 * dpr;
        ctx.strokeStyle = "#36e0a0";
        ctx.stroke();
        ec._fit = { ox, oy, dw, dh, dpr };
      }
      function fitRect(cw, ch, W, H) {
        const r = cw / ch,
          sr = W / H;
        let dw, dh, ox, oy;
        if (r > sr) {
          dw = W;
          dh = W / r;
          ox = 0;
          oy = (H - dh) / 2;
        } else {
          dh = H;
          dw = H * r;
          oy = 0;
          ox = (W - dw) / 2;
        }
        return { ox, oy, dw, dh };
      }

      /* ручки (DOM) поверх editCanvas */
      let handles = [];
      function placeHandles() {
        handles.forEach((h) => h.remove());
        handles = [];
        for (let i = 0; i < 4; i++) {
          const h = document.createElement("div");
          h.className = "handle";
          h.dataset.i = i;
          els.editWrap.appendChild(h);
          bindHandle(h);
          handles.push(h);
        }
        syncHandles();
      }
      function syncHandles() {
        const r = els.stage.getBoundingClientRect();
        const { ox, oy, dw, dh, dpr } = els.editCanvas._fit;
        for (let i = 0; i < 4; i++) {
          const x = (ox + quad[i].x * dw) / dpr,
            y = (oy + quad[i].y * dh) / dpr;
          handles[i].style.left = x + "px";
          handles[i].style.top = y + "px";
        }
      }
      function bindHandle(h) {
        let active = false;
        const move = (e) => {
          if (!active) return;
          e.preventDefault();
          const pt = "touches" in e ? e.touches[0] : e;
          const r = els.stage.getBoundingClientRect();
          const { ox, oy, dw, dh, dpr } = els.editCanvas._fit;
          let nx = ((pt.clientX - r.left) * dpr - ox) / dw;
          let ny = ((pt.clientY - r.top) * dpr - oy) / dh;
          const i = +h.dataset.i;
          quad[i] = { x: clamp(nx, 0, 1), y: clamp(ny, 0, 1) };
          drawEditFrame();
          syncHandles();
        };
        const up = () => {
          active = false;
          document.removeEventListener("pointermove", move);
          document.removeEventListener("pointerup", up);
        };
        h.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          active = true;
          document.addEventListener("pointermove", move);
          document.addEventListener("pointerup", up);
        });
      }

      /* ───────────────────── Гомография + выпрямление ───────────────────── */
      function orderCorners(q) {
        // на вход 4 точки в пикселях; возвращаем TL,TR,BR,BL
        const bySum = [...q].sort((a, b) => a.x + a.y - (b.x + b.y));
        const tl = bySum[0],
          br = bySum[3];
        const rest = [bySum[1], bySum[2]];
        const byDiff = rest.sort((a, b) => a.x - a.y - (b.x - b.y)); // TR большой (x-y), BL малый
        const bl = byDiff[0],
          tr = byDiff[1];
        return [tl, tr, br, bl];
      }
      // решает 8x8 систему методом Гаусса с частичным выбором ведущего
      function solve8(A, b) {
        const n = 8;
        for (let col = 0; col < n; col++) {
          let piv = col;
          for (let r = col + 1; r < n; r++)
            if (Math.abs(A[r][col]) > Math.abs(A[piv][col])) piv = r;
          [A[col], A[piv]] = [A[piv], A[col]];
          [b[col], b[piv]] = [b[piv], b[col]];
          const d = A[col][col] || 1e-9;
          for (let r = 0; r < n; r++) {
            if (r === col) continue;
            const f = A[r][col] / d;
            for (let c = col; c < n; c++) A[r][c] -= f * A[col][c];
            b[r] -= f * b[col];
          }
        }
        const x = new Array(n);
        for (let i = 0; i < n; i++) x[i] = b[i] / (A[i][i] || 1e-9);
        return x;
      }
      // H, отображающая src->dst (4 точки)
      function getTransform(src, dst) {
        const A = [],
          b = [];
        for (let i = 0; i < 4; i++) {
          const { x: sx, y: sy } = src[i],
            { x: dx, y: dy } = dst[i];
          A.push([sx, sy, 1, 0, 0, 0, -sx * dx, -sy * dx]);
          b.push(dx);
          A.push([0, 0, 0, sx, sy, 1, -sx * dy, -sy * dy]);
          b.push(dy);
        }
        const h = solve8(A, b);
        return [h[0], h[1], h[2], h[3], h[4], h[5], h[6], h[7], 1];
      }
      const applyH = (H, x, y) => {
        const w = H[6] * x + H[7] * y + H[8];
        return {
          x: (H[0] * x + H[1] * y + H[2]) / w,
          y: (H[3] * x + H[4] * y + H[5]) / w,
        };
      };

      function warpDocument() {
        // углы в пикселях исходного кадра
        const src = orderCorners(
          quad.map((p) => ({ x: p.x * capW, y: p.y * capH })),
        );
        const [TL, TR, BR, BL] = src;
        const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        let outW = Math.round(Math.max(dist(BR, BL), dist(TR, TL)));
        let outH = Math.round(Math.max(dist(TR, BR), dist(TL, BL)));
        const cap = 2200;
        const s = Math.min(1, cap / Math.max(outW, outH));
        outW = Math.max(1, Math.round(outW * s));
        outH = Math.max(1, Math.round(outH * s));

        const dst = [
          { x: 0, y: 0 },
          { x: outW, y: 0 },
          { x: outW, y: outH },
          { x: 0, y: outH },
        ];
        // нам нужна обратная: для каждого пикселя выхода -> координата в источнике
        const Hinv = getTransform(dst, src);

        const sc = captured.getContext("2d");
        const srcImg = sc.getImageData(0, 0, capW, capH).data;
        const out = new ImageData(outW, outH);
        const od = out.data;
        for (let y = 0; y < outH; y++) {
          for (let x = 0; x < outW; x++) {
            const p = applyH(Hinv, x + 0.5, y + 0.5);
            bilinear(srcImg, capW, capH, p.x, p.y, od, (y * outW + x) * 4);
          }
        }
        const c = document.createElement("canvas");
        c.width = outW;
        c.height = outH;
        c.getContext("2d").putImageData(out, 0, 0);
        return c;
      }
      function bilinear(src, w, h, fx, fy, out, oi) {
        if (fx < 0 || fy < 0 || fx > w - 1 || fy > h - 1) {
          out[oi] = out[oi + 1] = out[oi + 2] = 0;
          out[oi + 3] = 255;
          return;
        }
        const x0 = fx | 0,
          y0 = fy | 0,
          x1 = Math.min(x0 + 1, w - 1),
          y1 = Math.min(y0 + 1, h - 1);
        const ax = fx - x0,
          ay = fy - y0;
        for (let k = 0; k < 3; k++) {
          const i00 = (y0 * w + x0) * 4 + k,
            i10 = (y0 * w + x1) * 4 + k,
            i01 = (y1 * w + x0) * 4 + k,
            i11 = (y1 * w + x1) * 4 + k;
          const top = src[i00] * (1 - ax) + src[i10] * ax;
          const bot = src[i01] * (1 - ax) + src[i11] * ax;
          out[oi + k] = top * (1 - ay) + bot * ay;
        }
        out[oi + 3] = 255;
      }

      /* ───────────────────── Фильтры результата ───────────────────── */
      function applyFilter(srcCanvas, mode) {
        const w = srcCanvas.width,
          h = srcCanvas.height;
        const ctx = srcCanvas.getContext("2d");
        const img = ctx.getImageData(0, 0, w, h),
          d = img.data;
        if (mode === "color") return srcCanvas;

        const gray = new Uint8ClampedArray(w * h);
        for (let i = 0, j = 0; i < d.length; i += 4, j++)
          gray[j] = (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114) | 0;

        if (mode === "gray") {
          for (let i = 0, j = 0; i < d.length; i += 4, j++) {
            d[i] = d[i + 1] = d[i + 2] = gray[j];
          }
        } else if (mode === "bw") {
          const bw = adaptiveThreshold(
            gray,
            w,
            h,
            Math.max(15, (Math.min(w, h) / 16) | 0),
            12,
          );
          for (let i = 0, j = 0; i < d.length; i += 4, j++) {
            const v = bw[j];
            d[i] = d[i + 1] = d[i + 2] = v;
          }
        }
        const out = document.createElement("canvas");
        out.width = w;
        out.height = h;
        out.getContext("2d").putImageData(img, 0, 0);
        return out;
      }
      function adaptiveThreshold(gray, w, h, S, C) {
        // адаптивный порог по локальному среднему через интегральное изображение
        const I = new Float64Array((w + 1) * (h + 1));
        for (let y = 1; y <= h; y++) {
          let rs = 0;
          for (let x = 1; x <= w; x++) {
            rs += gray[(y - 1) * w + (x - 1)];
            I[y * (w + 1) + x] = I[(y - 1) * (w + 1) + x] + rs;
          }
        }
        const out = new Uint8ClampedArray(w * h),
          half = S >> 1;
        for (let y = 0; y < h; y++) {
          const y1 = Math.max(0, y - half),
            y2 = Math.min(h - 1, y + half);
          for (let x = 0; x < w; x++) {
            const x1 = Math.max(0, x - half),
              x2 = Math.min(w - 1, x + half);
            const cnt = (x2 - x1 + 1) * (y2 - y1 + 1);
            const sum =
              I[(y2 + 1) * (w + 1) + (x2 + 1)] -
              I[y1 * (w + 1) + (x2 + 1)] -
              I[(y2 + 1) * (w + 1) + x1] +
              I[y1 * (w + 1) + x1];
            out[y * w + x] = gray[y * w + x] > sum / cnt - C ? 255 : 0;
          }
        }
        return out;
      }

      /* ───────────────────── Сканировать → результат ───────────────────── */
      function doScan() {
        setStatus("Выпрямляю…");
        setTimeout(() => {
          // даём кадру отрисовать статус
          lastResult = warpDocument();
          currentFilter = "color";
          syncFilterButtons();
          renderResult();
          setMode("result");
          setStatus(null);
        }, 20);
      }
      function renderResult() {
        const filtered = applyFilter(lastResult, currentFilter);
        const rc = els.resultCanvas,
          dpr = Math.min(window.devicePixelRatio || 1, 2);
        const r = els.stage.getBoundingClientRect();
        rc.width = Math.round(r.width * dpr);
        rc.height = Math.round(r.height * dpr);
        rc.style.width = r.width + "px";
        rc.style.height = r.height + "px";
        const ctx = rc.getContext("2d");
        ctx.clearRect(0, 0, rc.width, rc.height);
        ctx.fillStyle = "#0e1014";
        ctx.fillRect(0, 0, rc.width, rc.height);
        const { ox, oy, dw, dh } = fitRect(
          filtered.width,
          filtered.height,
          rc.width,
          rc.height,
        );
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(filtered, ox, oy, dw, dh);
        rc._filtered = filtered;
      }

      /* ───────────────────── Режимы / UI ───────────────────── */
      function setMode(m) {
        els.video.style.display = m === "capture" ? "block" : "none";
        els.overlay.style.display = m === "capture" ? "block" : "none";
        els.editWrap.style.display = m === "edit" ? "block" : "none";
        els.resultWrap.style.display = m === "result" ? "block" : "none";
        els.barCapture.style.display = m === "capture" ? "flex" : "none";
        els.barEdit.style.display = m === "edit" ? "flex" : "none";
        els.barResult.style.display = m === "result" ? "flex" : "none";
        els.hint.textContent =
          m === "capture"
            ? "Наведите на документ"
            : m === "edit"
              ? "Подвиньте углы"
              : "Готово";
      }
      function setStatus(t) {
        if (t) {
          els.status.hidden = false;
          els.status.textContent = t;
        } else els.status.hidden = true;
      }
      function syncFilterButtons() {
        document.querySelectorAll(".filters button").forEach((b) => {
          b.setAttribute("aria-pressed", String(b.dataset.f === currentFilter));
        });
      }

      /* ───────────────────── События ───────────────────── */
      els.shutter.addEventListener("click", capture);
      els.flipBtn.addEventListener("click", () => {
        facing = facing === "environment" ? "user" : "environment";
        startCamera();
      });
      els.autoBtn.addEventListener("click", () => {
        autoDetect = !autoDetect;
        els.autoBtn.setAttribute("aria-pressed", String(autoDetect));
      });
      els.retakeBtn.addEventListener("click", () => {
        setMode("capture");
        loop();
      });
      els.backBtn.addEventListener("click", () => {
        setMode("edit");
        drawEditFrame();
        placeHandles();
      });
      els.scanBtn.addEventListener("click", doScan);
      document.querySelectorAll(".filters button").forEach((b) => {
        b.addEventListener("click", () => {
          currentFilter = b.dataset.f;
          syncFilterButtons();
          renderResult();
        });
      });
      els.saveBtn.addEventListener("click", () => {
        const c = els.resultCanvas._filtered || lastResult;
        c.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          els.dl.href = url;
          els.dl.download = "scan-" + Date.now() + ".png";
          els.dl.click();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
        }, "image/png");
      });
      window.addEventListener("resize", () => {
        if (els.editWrap.style.display === "block") {
          drawEditFrame();
          syncHandles();
        }
        if (els.resultWrap.style.display === "block") renderResult();
      });

      /* старт */
      setMode("capture");
      startCamera();
    </script>
  </body>
</html>
